# docker-compose.yml
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mliga
      POSTGRES_PASSWORD: mliga
      POSTGRES_DB: mliga
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mliga"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
